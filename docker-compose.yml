services:
  slicer-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: 3d-psa:latest
    container_name: 3d-psa-backend-server
    user: ${SLICER_CONTAINER_USER:-0:0}
    env_file:
      - .env
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.get('http://127.0.0.1:3000/health',res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));req.setTimeout(5000,()=>{req.destroy();process.exit(1);});"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./configs:/app/configs
    restart: unless-stopped
    stop_grace_period: 30s

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: 3d-psa-monitoring
    profiles: ["monitoring"]
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uptime-kuma-data-next:/app/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  uptime-kuma-data-next: